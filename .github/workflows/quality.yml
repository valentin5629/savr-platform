name: Quality Gate
on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  # Detection des prerequis pour les jobs differes (modules 0.3 / 0.4).
  # `hashFiles()` n'est pas autorise au niveau `jobs.<job_id>.if` — on passe
  # par un job de detection + outputs reutilises via `needs`. Pattern propre,
  # pas de continue-on-error : un job sans prerequis = simplement non execute.
  detect-prereqs:
    runs-on: ubuntu-latest
    outputs:
      has_migrations: ${{ steps.detect.outputs.has_migrations }}
      has_playwright: ${{ steps.detect.outputs.has_playwright }}
      has_next: ${{ steps.detect.outputs.has_next }}
    steps:
      - uses: actions/checkout@v4
      - id: detect
        run: |
          set -e
          if compgen -G "supabase/migrations/*.sql" > /dev/null; then
            echo "has_migrations=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_migrations=false" >> "$GITHUB_OUTPUT"
          fi
          if compgen -G "playwright.config.*" > /dev/null; then
            echo "has_playwright=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_playwright=false" >> "$GITHUB_OUTPUT"
          fi
          if compgen -G "packages/plateforme/next.config.*" > /dev/null; then
            echo "has_next=true"  >> "$GITHUB_OUTPUT"
          else
            echo "has_next=false" >> "$GITHUB_OUTPUT"
          fi

  lint-typecheck-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm -w format:check
      - run: pnpm -w typecheck
      - run: pnpm -w lint
      - run: pnpm -w test:unit
      - run: pnpm -w build

  # Garde-fou 3 TMS-Ready : anti-couplage MTS-1/Everest (deterministe, sans DB).
  # Echec = reference directe a un transporteur hors packages/adapters/.
  anti-coupling:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-coupling.sh

  # Tests pgTAP : RLS (sous role 'authenticated', non negociable) + garde-fou 4
  # TMS-Ready (outbox par mutation : supabase/tests/outbox_par_mutation.test.sql).
  # `supabase test db` execute TOUS les *.test.sql via pg_prove → les deux sont
  # couverts par ce job bloquant.
  # Skip 0.1 : aucune migration -> rien a tester. Reactive automatiquement des
  # qu'un fichier apparait dans supabase/migrations/ (module 0.3).
  pgtap-rls-outbox:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: 2.105.0 }
      - run: supabase start
      - run: supabase db reset
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - run: supabase test db # pgTAP RLS (role 'authenticated') + outbox par mutation

  # Skip 0.1 : pas de Playwright config (verticales UI, modules > 0.1).
  # Build + start en mode production pour eviter le timeout du webServer dev
  # (Next.js 15 en mode dev depasse les 120s de compilation a froid sur le runner).
  e2e:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_playwright == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js pour les tests E2E
        run: pnpm --filter @savr/plateforme build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      - name: Démarrer le serveur Next.js en arrière-plan
        run: pnpm --filter @savr/plateforme start &
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      - run: pnpm exec playwright install --with-deps
      - name: Attendre que le serveur soit prêt
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3001 > /dev/null 2>&1 && break
            sleep 1
          done
      - run: pnpm -w test:e2e
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3001

  # Install du binaire gitleaks directement : `gitleaks-action@v2` exige une
  # licence (faux positif sur repos perso). Le CLI open source ne l'exige pas.
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Run gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact --verbose --exit-code 1
      - uses: pnpm/action-setup@v4
      - run: pnpm audit --audit-level=high || true

  # Skip 0.1 : aucune migration -> rien a verifier. Reactive automatiquement
  # des qu'un fichier apparait dans supabase/migrations/ (module 0.3).
  migrations:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: supabase/setup-cli@v1
        with: { version: 2.105.0 }
      - run: supabase start
      # `supabase start` rend la main avant que Postgres soit pleinement stable.
      # On attend que pg_isready réponde 3x d'affilée AVANT le reset : sans ce
      # filet, le conteneur chute parfois au passage migrate→seed (faux positif
      # infra récurrent, ≠ erreur SQL — cf. PR #62 run 27772196968).
      - name: Attente Postgres prêt et stable (avant reset)
        run: |
          ok=0
          for i in $(seq 1 30); do
            if pg_isready -h 127.0.0.1 -p 54322 -U postgres -q; then
              ok=$((ok + 1))
              if [ "$ok" -ge 3 ]; then
                echo "Postgres stable ($ok checks consécutifs)."
                exit 0
              fi
            else
              ok=0
            fi
            sleep 2
          done
          echo "::warning::Postgres pas confirmé stable après 60s — reset tenté (avec retry)."
      # Retry sur la chute de conteneur infra : le reset recrée la base à zéro,
      # donc re-tenter est idempotent. On redémarre le stack entre tentatives
      # pour repartir d'un conteneur sain. --debug seulement à la dernière
      # tentative (diagnostic), sinon firehose de logs qui charge le runner.
      - name: Run supabase db reset (retry sur chute conteneur infra)
        run: |
          set -uo pipefail
          for attempt in 1 2 3; do
            flags=""
            [ "$attempt" -eq 3 ] && flags="--debug"
            echo "::group::supabase db reset — tentative $attempt/3"
            if supabase db reset $flags; then
              echo "::endgroup::"
              echo "db reset OK (tentative $attempt/3)."
              exit 0
            fi
            echo "::endgroup::"
            echo "::warning::db reset KO (tentative $attempt/3) — redémarrage du stack puis nouvelle tentative."
            supabase stop --no-backup || true
            supabase start
            for i in $(seq 1 30); do
              pg_isready -h 127.0.0.1 -p 54322 -U postgres -q && break
              sleep 2
            done
          done
          echo "::error::supabase db reset a échoué après 3 tentatives (chute conteneur persistante)."
          exit 1
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - name: Garde anti-destructif
        run: |
          FILES=$(git diff --name-only origin/main... -- 'supabase/migrations/**')
          if [ -z "$FILES" ]; then
            echo "Aucune migration nouvelle — garde anti-destructif skippé."; exit 0
          fi
          DESTRUCTIVE=$(echo "$FILES" | xargs grep -Eil 'drop +(table|column)|truncate' || true)
          if [ -z "$DESTRUCTIVE" ]; then exit 0; fi
          FAIL=false
          for f in $DESTRUCTIVE; do
            if grep -qi -- '-- REVIEWED-DESTRUCTIVE:' "$f"; then
              echo "✅ $f — revue documentée :"
              grep -i -- '-- REVIEWED-DESTRUCTIVE:' "$f"
            else
              echo "::error::Migration destructive sans marqueur -- REVIEWED-DESTRUCTIVE: dans $f"
              FAIL=true
            fi
          done
          if [ "$FAIL" = "true" ]; then exit 1; fi

  # Vérifie les plans d'exécution des requêtes critiques (SLA §16 : p95 < 200ms listes).
  # Détecte les Sequential Scans sur tables volumineuses avant qu'ils atteignent la prod.
  # Skip tant qu'aucune migration n'existe. seed:minimal non lancé (guard project-ref dev) :
  # EXPLAIN fonctionne sur tables vides — le plan révèle l'absence d'index.
  perf-check:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: 2.105.0 }
      - run: supabase start
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - run: supabase db reset
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - name: Vérification plans requêtes critiques
        run: bash scripts/check-query-perf.sh
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

  # Vérifie la conformité de la structure outbox_events et la présence des schémas
  # JSON E1/E2/E3/E5 (garde-fou G2 TMS-Ready — payload V2 compatible).
  outbox-contracts:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Vérification contrats outbox V2
        run: bash scripts/check-outbox-contracts.sh

  # Skip tant que next.config.* absent. Mesure le poids du bundle statique Next.js.
  # size-limit sera configuré quand le bundle sera non-trivial (modules UI).
  # Pour l'instant : build réussi + taille .next/static < 5 MB = seuil V1 minimal.
  bundle-budget:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_next == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build Next.js
        run: pnpm --filter @savr/plateforme build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      - name: Vérification budget bundle
        run: |
          SIZE=$(du -sb packages/plateforme/.next/static 2>/dev/null | cut -f1 || echo 0)
          echo "Bundle static size: ${SIZE} bytes"
          if [ "${SIZE}" -gt 5242880 ]; then
            echo "::error::Bundle trop lourd (${SIZE} bytes > 5 MB)" ; exit 1
          fi

  # ===========================================================================
  # Lot 0 (remédiation post-audit) — GARDE-FOUS EN MODE RAPPORT (T0)
  # ===========================================================================
  # Les ~118 écarts de l'audit code-vs-CDC rendraient ces gates rouges en
  # permanence s'ils bloquaient d'emblée. On les câble donc en mode RAPPORT :
  # `continue-on-error: true` (le workflow reste vert), résumé dans
  # $GITHUB_STEP_SUMMARY + compteur de burn-down. Flip bloquant (T1) = retrait
  # de `continue-on-error` par périmètre, derrière le lot de fix correspondant
  # (cliquet). Cf. `30. Review Code/Backlog final priorisé/Lot 0 …`.

  # G7 — Cohérence colonne-DB par route. Recompile l'app avec le client Supabase
  # TYPÉ contre le schéma réel (`packages/shared/src/database.types.ts`, snapshot
  # HEAD régénérable via `pnpm db:types:local`). Toute colonne/RPC inexistante
  # ciblée par .eq/.select/.insert/.update/.rpc devient une erreur compilée →
  # comptée par le runner. NB : sans DB (snapshot committé) ; la détection de
  # drift snapshot↔migrations est le rôle de G11 (futur, cf. Lot 0).
  column-db:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: G7 — rapport colonne-DB
        run: pnpm check:column-db

  # G8 (volet léger) — Primitives orphelines : logger/sendAlert/captureException
  # exportés de @savr/shared mais sans call-site de production (chaînes
  # event→log/alerte muettes). Pur grep, sans DB. Le volet process de G8 =
  # mandat du reviewer `reviewer-conformite-spec` (item-par-item, GO-VISUAL).
  primitive-orpheline:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — informatif, non bloquant en T0
    steps:
      - uses: actions/checkout@v4
      - name: G8 — rapport primitives orphelines
        run: bash scripts/check-primitive-orpheline.sh

  # G2 — Manifeste au grain LIVRABLE (R0b). Valide chaque specs/manifests/M*.json
  # contre specs/manifests/_schema.json (validateur de sous-ensemble JSON Schema
  # embarqué, sans dépendance) et SIGNALE le grain scénario-seul (= deliverables[]
  # absent → livrable CDC non transcrit invisible, cause racine de l'audit). Pur
  # Node (tsx), sans DB. Flip bloquant (T1) quand tous les manifestes portent un
  # deliverables[] valide (durcissement par cliquet).
  manifest-grain:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: G2 — rapport grain livrable
        run: pnpm check:manifest-grain

  # G1 — check:spec-deliverables (R0b). Diff livrables CDC (index seedé depuis
  # l'audit : specs/manifests/cdc-deliverables.index.json) ↔ union des
  # deliverables[] des manifestes. Un livrable CDC absent de tous les manifestes
  # (et non descopé) = non transcrit → SIGNALÉ. Ferme la cause racine (gates
  # code-vs-manifeste, jamais code-vs-CDC). Pur Node (tsx), sans DB. Flip bloquant
  # (T1) PAR MODULE dès que son manifeste est re-grainé et à jour.
  spec-deliverables:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: G1 — rapport couverture livrables CDC
        run: pnpm check:spec-deliverables

  # ===========================================================================
  # Lot 0 / R0c — Garde-fous de 2e ordre (red-team), MODE RAPPORT (T0)
  # ===========================================================================
  # Ferment les fuites résiduelles que G1-G8 laissent : L1 sémantique fausse,
  # L2 index incomplet, L3 drift CDC, L4 test complaisant, L5 jugement humain.
  # Tous `continue-on-error: true` (le workflow reste vert) + $GITHUB_STEP_SUMMARY.

  # G6 — Schéma V1 (migrations réelles, après db reset) vs DDL cible V2
  # (specs/ddl-cible/schema_cible_v2.sql chargé dans une base scratch). Diff via
  # pg_catalog (décision Val 2026-06-24 : zéro dépendance npm). Garde-fou 1
  # TMS-Ready : anti-renommage/migration silencieuse en V2. Distinct de G7
  # (qui compare au schéma RÉEL V1). Hors allowlist v1-divergences-allowlist.txt
  # = signalé. Skip tant qu'aucune migration n'existe.
  schema-vs-cible:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - uses: supabase/setup-cli@v1
        with: { version: 2.105.0 }
      - run: supabase start
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - run: supabase db reset
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - name: Charger le DDL cible V2 dans une base scratch
        run: |
          V1_URL='postgresql://postgres:postgres@localhost:54322/postgres'
          psql "$V1_URL" -v ON_ERROR_STOP=1 -c "DROP DATABASE IF EXISTS cible_v2;"
          psql "$V1_URL" -v ON_ERROR_STOP=1 -c "CREATE DATABASE cible_v2;"
          # Le DDL cible est self-contained (CREATE EXTENSION/SCHEMA/TYPE/TABLE/FK).
          # En mode rapport : on log l'échec de chargement sans rougir le job.
          psql 'postgresql://postgres:postgres@localhost:54322/cible_v2' \
            -v ON_ERROR_STOP=1 -f specs/ddl-cible/schema_cible_v2.sql \
            || echo "::warning::Chargement DDL cible partiel — diff sur ce qui a chargé."
      - name: G6 — rapport schéma vs cible
        run: pnpm check:schema-vs-cible
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
          CIBLE_DATABASE_URL: postgresql://postgres:postgres@localhost:54322/cible_v2

  # G9 — Oracles sémantiques (L1 : règle métier fausse malgré test vert). Exécute
  # supabase/tests-report/g9_semantic_oracle.test.sql (HORS supabase/tests/ pour
  # ne pas être ramassé par le job bloquant pgtap-rls-outbox) : oracles fn_est_*
  # comparés au comportement RÉEL aux cas-limites. Skip tant qu'aucune migration.
  semantic-oracle:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: 2.105.0 }
      - run: supabase start
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - run: supabase db reset
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - name: G9 — rapport oracles sémantiques
        run: bash scripts/run-report-pgtap.sh supabase/tests-report/g9_semantic_oracle.test.sql "G9 — Oracles sémantiques"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

  # integration-contracts — Postconditions sur VRAIE DB (L4 : test complaisant).
  # n° facture gapless + ligne alerte réellement écrite. R2/Storage reporté preprod
  # (skip tracé). Exécute supabase/tests-report/integration_contracts.test.sql.
  integration-contracts:
    needs: detect-prereqs
    if: needs.detect-prereqs.outputs.has_migrations == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with: { version: 2.105.0 }
      - run: supabase start
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - run: supabase db reset
        env:
          SUPABASE_NO_ANALYTICS: 'true'
      - name: integration-contracts — rapport postconditions DB réelles
        run: bash scripts/run-report-pgtap.sh supabase/tests-report/integration_contracts.test.sql "integration-contracts — postconditions DB"
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres

  # G10 — Complétude inverse des manifestes (L2 : index incomplet). Chaque module
  # roadmap V1 a-t-il un manifeste ? Chaque manifeste porte-t-il cdc_source_hash ?
  # Pur Node (tsx), sans DB.
  manifest-completeness:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: G10 — rapport complétude manifestes
        run: pnpm check:manifest-completeness

  # G11 — Drift CDC (L3 : CDC patché, manifeste figé). Compare cdc_source_hash
  # figé ↔ .cdc-metadata.json courant ; annote les fichiers modifiés dans la PR.
  # fetch-depth: 0 pour le git diff vs origin/main. Pur Node (tsx), sans DB.
  cdc-drift:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      # Régénère .cdc-metadata.json depuis specs/cdc AVANT le diff : sinon G11
      # compare contre un metadata commité potentiellement périmé (R0d finding #10).
      - run: pnpm gen:cdc-metadata
      - name: G11 — rapport drift CDC ↔ manifeste
        run: pnpm check:cdc-drift

  # preuve-visuelle (L5) — catalogue des livrables présentationnels (à-vérifier)
  # exigeant une preuve screenshot/Loom en PR + vérif backstop go-live
  # (docs/audit/AUDIT_SCOPE.json). Discipline humaine ; ce job rend le catalogue
  # non-contournable (compté). Pur Node (tsx), sans DB.
  preuve-visuelle:
    runs-on: ubuntu-latest
    continue-on-error: true # MODE RAPPORT — ne rougit jamais le workflow en T0
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: L5 — rapport catalogue preuve-visuelle
        run: pnpm check:preuve-visuelle

  # ===========================================================================
  # R0d — MÉTA-CLIQUET anti-régression. SEUL gate Lot 0 BLOQUANT (continue-on-error
  # absent). Les gates G1/G2/G7/G10/G11 restent en mode rapport (ils observent le
  # backlog), MAIS ce job échoue si l'un de leurs compteurs DÉPASSE sa baseline
  # versionnée (docs/audit/gate-baseline.json) → toute NOUVELLE divergence rougit,
  # sans avoir à flipper chaque gate. Un lot qui corrige fait baisser la baseline
  # (pnpm check:ratchet --update). Pas de DB requise (snapshot db.types committé).
  gate-ratchet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Régénère .cdc-metadata.json (cohérence G11 dans le cliquet)
        run: pnpm gen:cdc-metadata
