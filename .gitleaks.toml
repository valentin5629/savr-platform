title = "Savr gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Faux positifs — clés d'objets de colonnes de tableau (noms de champs SQL) + storageKey de test (R23b)"
commits = [
  "b4f20b7d33f3d19839a59f1edd5442e8d92722ae",
]
regexes = [
  # storageKey factices des tests DashboardFilterBar (R23b) — chaînes de test, pas
  # des secrets ; la règle generic-api-key les flagge par entropie (« r23b »).
  # Couvre tous les suffixes (presets/apply/default12mois/…).
  '''test-r23b-[a-z0-9-]+''',
  # Clé du chip de drill-down « Collecte <48h non validée » (revue E2E 2026-07-15) —
  # identifiant de filtre de la liste Collectes, pas un secret ; generic-api-key la
  # flagge par entropie (les chiffres « _48h_ »).
  '''collectes_48h_non_validees''',
]
